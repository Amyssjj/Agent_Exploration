# OA — Operational Analytics Configuration
# Auto-generated by `oa init`. Edit freely.
#
# Documentation: https://github.com/motusai/oa-cli

# Path to your OpenClaw installation
openclaw_home: ~/.openclaw

# Path to the workspace where daily/long-term memory lives
workspace_root: ~/.openclaw/workspace

# Memory files used to determine whether work was logged
memory_paths:
  - memory/{date}.md
  - MEMORY.md

# SQLite database path (relative to project root)
db_path: data/monitor.db

# Agents / execution units in your environment
agents:
  - id: main
    name: Main

# Goals to track
goals:
  - id: cron_reliability
    name: Cron Reliability
    builtin: true
    metrics:
      - name: success_rate
        unit: "%"
        healthy: 95
        warning: 80

  - id: team_health
    name: Team Health
    builtin: true
    metrics:
      - name: active_agent_count
        unit: count
        healthy: 1
        warning: 1
      - name: memory_discipline
        unit: "%"
        healthy: 80
        warning: 50

  # Example: Custom goal
  # - id: content_quality
  #   name: Content Quality
  #   builtin: false
  #   pipeline: pipelines/content_quality.py
  #   metrics:
  #     - name: approval_rate
  #       unit: "%"
  #       healthy: 90
  #       warning: 70
